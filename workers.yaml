orchestrator_host: jaguar   # this machine's tailscale hostname (for remote workers to connect back)
port: 5555

workers:
  - name: jaguar-3090
    host: localhost         # local subprocess, no SSH
    venv: cuda/.venv/bin/python
    workdir: "."
    device: cuda
    chunk_budget_mb: 128    # 12GB VRAM — keep chunks small

  # - name: jaguar-strix
  #   host: localhost         # local subprocess, no SSH
  #   venv: rocm/.venv/bin/python
  #   workdir: "."
  #   device: cuda

  # - name: tiger
  #   host: tiger             # tailscale hostname
  #   venv: .venv/bin/python
  #   workdir: "~/Projects/SKCQ"
  #   device: cpu             # MPS is slow at .item() syncs in kmeans++; CPU is faster on M3 Ultra
  #   chunk_budget_mb: 4096   # 512GB UMA — can use large chunks

  - name: serval
    host: localhost       # this machine
    venv: .venv/bin/python
    workdir: "."
    device: auto
    chunk_budget_mb: 512    # 12GB VRAM — keep chunks small

  - name: leopard
    host: leopard          # tailscale hostname
    venv: leopard/.venv/bin/python
    workdir: "~/Projects/SKCQ"
    device: cuda           # ROCm exposes as cuda in torch
    chunk_budget_mb: 24576  # 34GB per R9700; ~24GB headroom per job
    parallelism: 2         # one job per dGPU
    devices: [0, 1]        # dGPU indices; iGPU (gfx1036) excluded
